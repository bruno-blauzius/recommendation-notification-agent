version: "2"

run:
    timeout: 5m
    # new-from-rev: HEAD~1

linters:
    disable-all: true
    enable:
      # --- Correctness ---
      - govet
      - errcheck
      - staticcheck
      - ineffassign
      # typecheck is built-in in golangci-lint v2

      # --- Security (OWASP / CWE) ---
      - gosec

      # --- Database safety ---
      - rowserrcheck
      - sqlclosecheck

      # --- HTTP safety ---
      - bodyclose
      - noctx

      # --- Error-handling patterns ---
      - nilerr
      - errorlint

      # --- Style / Clean Code ---
      - revive
      - misspell
      - gocritic

      # --- Complexity ---
      - cyclop
      - gocognit

      # --- Dead code / unused ---
      - unused

    # golangci-lint v2: settings nested under linters.settings
    settings:
        gosec:
            severity: medium
            confidence: medium
            excludes: []
            config:
                G201: HIGH
                G202: HIGH

        errcheck:
            check-type-assertions: true
            check-blank: false

        staticcheck:
            checks:
              - "all"
              - "-SA1019"

        revive:
            severity: warning
            rules:
              - name: var-naming
              - name: exported
              - name: error-return
              - name: error-strings
              - name: increment-decrement
              - name: range
              - name: blank-imports
              - name: context-as-argument
              - name: context-keys-type
              - name: deep-exit
              - name: defer
              - name: early-return

        gocritic:
            enabled-tags:
              - diagnostic
              - style
              - performance
            disabled-checks:
              - paramTypeCombine
              - unnamedResult
              - hugeParam

        cyclop:
            max-complexity: 15
            package-average: 10
            skip-tests: true

        gocognit:
            min-complexity: 20

        rowserrcheck:
            packages:
              - database/sql

        errorlint:
            errorf: true
            asserts: true
            comparison: true

issues:
    exclude-rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - noctx
          - bodyclose
      - path: cmd/
        linters:
          - noctx
      - linters:
          - unused
        text: "timeFormats"

    max-issues-per-linter: 50
    max-same-issues: 5
