# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'
        cache: true

    - name: Build
      run: go build -v ./...

    - name: Test (unit)
      run: go test -v ./tests/unit/...

  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
      with:
        # full history needed for new-from-rev diff in golangci-lint
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'
        cache: true

    - name: Set up Python (pre-commit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install pre-commit
      run: pip install pre-commit

    # Runs all hooks defined in .pre-commit-config.yaml except golangci-lint,
    # which is executed below via its dedicated action (better caching/output).
    # Hooks covered: trailing-whitespace, end-of-file-fixer, check-yaml,
    #   check-merge-conflict, mixed-line-ending, gofmt, go-mod-verify,
    #   go-mod-tidy-check, govulncheck.
    - name: pre-commit – all hooks
      env:
        SKIP: golangci-lint
      run: pre-commit run --all-files

    # ---------- golangci-lint (gosec, staticcheck, errcheck, etc.) ----------
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64.8
        args: --config=.golangci.yml --timeout=5m
