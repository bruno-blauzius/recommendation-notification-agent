# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'
        cache: true

    - name: Build
      run: go build -v ./...

    - name: Test (unit)
      run: go test -v ./tests/unit/...

  quality:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
      with:
        # full history needed for new-from-rev diff in golangci-lint
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'
        cache: true

    - name: Set up Python (pre-commit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install pre-commit
      run: pip install pre-commit

    # ---------- file hygiene (pre-commit-hooks) ----------
    - name: pre-commit – file hygiene
      run: pre-commit run trailing-whitespace end-of-file-fixer check-yaml check-merge-conflict mixed-line-ending --all-files

    # ---------- gofmt ----------
    - name: pre-commit – gofmt
      run: pre-commit run gofmt --all-files

    # ---------- go mod verify ----------
    - name: pre-commit – go mod verify
      run: pre-commit run go-mod-verify --all-files

    # ---------- go mod tidy ----------
    - name: pre-commit – go mod tidy check
      run: pre-commit run go-mod-tidy-check --all-files

    # ---------- govulncheck ----------
    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: govulncheck – vulnerability scan
      run: govulncheck ./...

    # ---------- golangci-lint (gosec, staticcheck, errcheck, etc.) ----------
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64.8
        args: --config=.golangci.yml --timeout=5m
