# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'
        cache: true

    - name: Build
      run: go build -v ./...

    - name: Test (unit)
      run: go test -v ./tests/unit/...

  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
      with:
        # full history needed for new-from-rev diff in golangci-lint
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'
        cache: true

    - name: Set up Python (pre-commit)
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install pre-commit
      run: pip install pre-commit

    # Runs all hooks defined in .pre-commit-config.yaml except golangci-lint,
    # which is executed below via its dedicated action (better caching/output).
    # Hooks covered: trailing-whitespace, end-of-file-fixer, check-yaml,
    #   check-merge-conflict, mixed-line-ending, gofmt, go-mod-verify,
    #   go-mod-tidy-check, govulncheck.
    - name: pre-commit – all hooks
      env:
        SKIP: golangci-lint
      run: pre-commit run --all-files

    # ---------- golangci-lint (gosec, staticcheck, errcheck, etc.) ----------
    # golangci-lint-action@v6 pins v1.64.8 (Go 1.24) which rejects go 1.26.3.
    # Installing the binary directly guarantees the correct version is used.
    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
          | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

    - name: golangci-lint
      run: golangci-lint run --config=.golangci.yml --timeout=5m

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: quality

    env:
      # Credentials used by docker-compose services and the API
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recommendation_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: recommendation_db
      DB_SSLMODE: disable
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DSN: amqp://guest:guest@localhost:5672/
      RABBITMQ_QUEUE: sender_recommendation_queue
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_USERNAME: default
      REDIS_PASSWORD: ""
      IDEMPOTENCY_TTL_SECONDS: 3600
      SERVER_PORT: 8080

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.3'
        cache: true

    # Sobe apenas as dependências (postgres, rabbitmq, redis) — sem a api,
    # que será executada pelo próprio runner para facilitar a coleta de logs.
    - name: Start infrastructure (postgres, rabbitmq, redis)
      run: |
        docker compose up -d postgres rabbitmq redis
        echo "Waiting for healthchecks..."
        timeout 90 bash -c '
          until docker compose ps postgres | grep -q "healthy" &&
                docker compose ps rabbitmq | grep -q "healthy" &&
                docker compose ps redis    | grep -q "healthy"; do
            sleep 3
          done'

    - name: Run integration tests against live infrastructure
      run: go test -v -timeout 60s ./tests/integration/...

    - name: Publish message to RabbitMQ (smoke payload)
      run: |
        docker exec $(docker compose ps -q rabbitmq) \
          rabbitmqadmin publish \
            exchange='' \
            routing_key=sender_recommendation_queue \
            payload='{"id":"smoke-001","sender_id":"ci-runner","score":99.0,"created_at":"2026-01-01T00:00:00","payload":{"cliente_descricao":"smoke test","perfil_identificado":"ci_test","recomendacoes":[{"produto":"Smoke","ramo":"CI","logo_url":"","seguradora":"CI","score_relevancia":1.0,"valor":"R$ 0","justificativa":"smoke"}]}}'

    - name: Start API
      run: |
        go build -o ./bin/api ./cmd/api
        ./bin/api &
        echo $! > api.pid
        sleep 5

    - name: Verify API consumed the message (check logs for processed id)
      run: |
        timeout 30 bash -c '
          while true; do
            if ./bin/api 2>&1 | grep -q "processed id=smoke-001"; then
              echo "Message consumed successfully"; exit 0
            fi
            sleep 2
          done' || \
        # Fallback: verificar via postgres se o registro foi salvo
        docker exec $(docker compose ps -q postgres) \
          psql -U postgres -d recommendation_db -c \
          "SELECT id FROM recommendations WHERE id='smoke-001'" | grep -q "smoke-001"

    - name: Stop API
      if: always()
      run: |
        if [ -f api.pid ]; then kill $(cat api.pid) || true; fi

    - name: Dump infrastructure logs on failure
      if: failure()
      run: docker compose logs

    - name: Tear down infrastructure
      if: always()
      run: docker compose down -v
